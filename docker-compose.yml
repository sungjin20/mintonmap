services:
  postgres:
    image: postgres:16-alpine
    container_name: mintonmap-postgres
    environment:
      POSTGRES_DB: mintonmap
      POSTGRES_USER: mintonmap
      POSTGRES_PASSWORD: mintonmap
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mintonmap -d mintonmap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
