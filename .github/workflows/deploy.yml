name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_KAKAO_MAP_APP_KEY: ${{ secrets.VITE_KAKAO_MAP_APP_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || '' }}
        run: npm run build

      - name: Check deploy SSH connectivity
        env:
          SCP_HOST: ${{ secrets.SCP_HOST }}
          SCP_PORT: ${{ secrets.SCP_PORT || '22' }}
        run: |
          if [ -z "$SCP_HOST" ]; then
            echo "SCP_HOST secret is empty."
            exit 1
          fi

          echo "Checking SSH connectivity to deploy host..."
          nc -vz -w 10 "$SCP_HOST" "$SCP_PORT"

      - name: Prepare backend artifact
        run: |
          mkdir -p deploy/backend
          cp package.json package-lock.json deploy/backend/
          cp -r apps deploy/backend/apps
          cp -r scripts deploy/backend/scripts
          cp -r db deploy/backend/db
          rm -rf deploy/backend/apps/frontend
          rm -f deploy/backend/apps/backend/.env

      - name: Prepare frontend artifact
        run: |
          mkdir -p deploy/frontend
          cp -r apps/frontend/dist/* deploy/frontend/

      - name: Upload backend artifact
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SCP_HOST }}
          username: ${{ secrets.SCP_USER }}
          key: ${{ secrets.SCP_SSH_KEY }}
          port: ${{ secrets.SCP_PORT || '22' }}
          source: "deploy/backend/*"
          target: "/tmp/mintonmap-deploy/backend"
          strip_components: 2
          rm: true
          timeout: 60s

      - name: Upload frontend artifact
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SCP_HOST }}
          username: ${{ secrets.SCP_USER }}
          key: ${{ secrets.SCP_SSH_KEY }}
          port: ${{ secrets.SCP_PORT || '22' }}
          source: "deploy/frontend/*"
          target: "/tmp/mintonmap-deploy/frontend"
          strip_components: 2
          rm: true
          timeout: 60s

      - name: Activate deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SCP_HOST }}
          username: ${{ secrets.SCP_USER }}
          key: ${{ secrets.SCP_SSH_KEY }}
          port: ${{ secrets.SCP_PORT || '22' }}
          timeout: 60s
          script_stop: true
          script: |
            set -e

            sudo mkdir -p /etc/mintonmap
            if [ ! -f /etc/mintonmap/backend.env ] && [ -f /opt/mintonmap/backend/apps/backend/.env ]; then
              sudo cp /opt/mintonmap/backend/apps/backend/.env /etc/mintonmap/backend.env
            fi

            if [ ! -f /etc/mintonmap/backend.env ]; then
              echo "/etc/mintonmap/backend.env is missing."
              echo "Create it once on the server before deploying."
              exit 1
            fi

            DEPLOY_GROUP="$(id -gn)"
            sudo chown root:"$DEPLOY_GROUP" /etc/mintonmap/backend.env
            sudo chmod 640 /etc/mintonmap/backend.env

            rm -rf /opt/mintonmap/backend /opt/mintonmap/frontend
            mv /tmp/mintonmap-deploy/backend /opt/mintonmap/backend
            mv /tmp/mintonmap-deploy/frontend /opt/mintonmap/frontend

            ln -sfn /etc/mintonmap/backend.env /opt/mintonmap/backend/apps/backend/.env
            test -r /opt/mintonmap/backend/apps/backend/.env

            cd /opt/mintonmap/backend

            npm ci --omit=dev
            npm run db:migrate

            pm2 restart mintonmap-api || pm2 start npm --name mintonmap-api -- run start --workspace @mintonmap/backend
            pm2 save

            sudo mkdir -p /var/www/mintonmap
            sudo rm -rf /var/www/mintonmap/*
            sudo cp -r /opt/mintonmap/frontend/* /var/www/mintonmap/
            sudo chown -R www-data:www-data /var/www/mintonmap

            sudo nginx -t
            sudo systemctl reload nginx
